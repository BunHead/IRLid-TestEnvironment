<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="copyright" content="Copyright 2025 Spencer Austin. All rights reserved." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Scan</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .scan-main {
      padding: 0 0 calc(var(--mobile-nav-h) + 22px);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .scan-viewport {
      position: relative;
      width: 100%;
      max-width: 720px;
      min-height: 280px;
      background: #0a0a0a;
      overflow: hidden;
    }
    @media (max-width: 720px) {
      .scan-viewport {
        max-width: 480px;
        max-height: 45vh;
      }
      #scanner video {
        object-fit: contain !important;
        max-height: 45vh !important;
      }
    }
    .scan-viewport.state-scanning { aspect-ratio: auto; }
    .scan-viewport.state-idle { aspect-ratio: 4 / 3; }
    .scan-finders {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }
    .scan-viewport.state-scanning .scan-finders { display: none; }
    .finder { position: absolute; width: 72px; height: 72px; }
    .finder.tl { top: 10%; left: 10%; }
    .finder.tr { top: 10%; right: 10%; }
    .finder.bl { bottom: 10%; left: 10%; }
    .finder .f-outer { position: absolute; inset: 0; border: 3px solid rgba(255,255,255,.18); }
    .finder .f-inner { position: absolute; inset: 18%; border: 2px solid rgba(255,255,255,.12); }
    .finder .f-core { position: absolute; inset: 30%; background: rgba(255,255,255,.10); }
    .idle-label {
      position: absolute;
      bottom: 18%;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,.45);
      font: 600 14px/1.3 system-ui, sans-serif;
      text-transform: uppercase;
      letter-spacing: .08em;
      z-index: 2;
    }
    .scan-viewport.state-scanning .idle-label { display: none; }
    #scanner { position: relative; width: 100%; z-index: 1; }
    #scanner video { width: 100% !important; height: auto !important; display: block !important; }
    #scanner > div { max-width: 100% !important; }
    #qr-shaded-region { display: none !important; }
    #trackingCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 4;
      pointer-events: none;
      display: none;
    }
    .scan-viewport.state-scanning #trackingCanvas { display: block; }
    .scan-dim {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      display: none;
    }
    .scan-viewport.state-scanning .scan-dim { display: block; }
    .scan-below {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .scan-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0;
    }
    .scan-status {
      font-size: 14px;
      color: #888;
      min-height: 22px;
      padding: 0 14px;
    }
    .scan-status.active { color: #e00; font-weight: 600; }
    .active-scan {
      background: #e00 !important;
      border-color: #e00 !important;
      color: #fff !important;
    }
    #debugControls { display: none; padding: 8px 14px 0; }
  </style>
</head>

<main class="scan-main">
  <div class="scan-viewport state-idle" id="scanViewport">
    <div class="scan-finders">
      <div class="finder tl"><div class="f-outer"></div><div class="f-inner"></div><div class="f-core"></div></div>
      <div class="finder tr"><div class="f-outer"></div><div class="f-inner"></div><div class="f-core"></div></div>

<script src="js/auth.js"></script>
<script src="js/backend.js"></script>
<script src="js/nav.js"></script>
<script src="js/sign.js?v=3.1"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="js/qr.js?v=63"></script>

<script>
  const IRLID_TS_TOL_S = 90;
  const IRLID_DIST_TOL_M = 12;
  const KEY_PREF_CAM = "irlid_preferred_camera_id";

  function isDebugMode() {
    try {
      if (new URLSearchParams(location.search).get("debug") === "1") return true;
      if (localStorage.getItem("irlid_debug") === "1") return true;
    } catch(e){}
    return false;
  }

  const debugPanel = document.createElement("div");
  debugPanel.id = "debugPanel";
  debugPanel.style.cssText = "position:fixed;top:50px;left:0;right:0;max-height:250px;overflow-y:auto;background:rgba(0,0,0,0.92);color:#0f0;font:13px monospace;padding:10px;z-index:9999;display:none;";
  document.body.appendChild(debugPanel);
  const debugToggle = document.createElement("button");
  debugToggle.textContent = "DBG";
  debugToggle.style.cssText = "position:fixed;top:50px;right:8px;z-index:10000;background:#222;color:#0f0;border:2px solid #0f0;padding:6px 12px;font:bold 14px monospace;border-radius:4px;display:none;";
  debugToggle.onclick = () => { debugPanel.style.display = debugPanel.style.display === "none" ? "block" : "none"; };
  document.body.appendChild(debugToggle);
  if (isDebugMode()) {
    debugToggle.style.display = "block";
    debugPanel.style.display = "block";
  }
  function dbg(msg) {
    console.log("[IRLid]", msg);
    const line = document.createElement("div");
    line.textContent = new Date().toLocaleTimeString() + " " + msg;
    debugPanel.appendChild(line);
    debugPanel.scrollTop = debugPanel.scrollHeight;
  }

  const statusEl = document.getElementById("status");
  const scanViewport = document.getElementById("scanViewport");
  const scanBtn = document.getElementById("scanBtn");
  const stopBtn = document.getElementById("stopBtn");
  const scannerEl = document.getElementById("scanner");
  const clearLocalBtn = document.getElementById("clearLocalBtn");
  const cameraSelect = document.getElementById("cameraSelect");
  const trackingCanvas = document.getElementById("trackingCanvas");
  const trackingCtx = trackingCanvas.getContext("2d");

  let html5QrCode = null;
  let trackingRAF = null;
  let lastQrCorners = null;
  let lastQrTime = 0;
  let qrDetectedCount = 0;

  function setStatus(msg, active) {
    statusEl.textContent = msg;
    statusEl.classList.toggle("active", !!active);
  }

  function setViewportState(s) {
    scanViewport.className = "scan-viewport state-" + s;
  }

  function classify(text){
    const t = (text || "").trim();
    if (t.startsWith("RZ:")) return { kind:"RESP_Z", v: t.slice(3) };
    if (t.startsWith("R:"))  return { kind:"RESP",   v: t.slice(2) };
    if (t.startsWith("HZ:")) return { kind:"HELLO_Z", v: t.slice(3) };
    if (t.startsWith("H:"))  return { kind:"HELLO",  v: t.slice(2) };

    try {
      const u = new URL(t);
      const path = (u.pathname || "").toLowerCase();
      const entryType = (u.searchParams.get("type") || "").toLowerCase();
      if ((path.endsWith("/org-entry.html") || path.endsWith("org-entry.html")) &&
          (entryType === "checkin" || entryType === "venue" || entryType === "doorman" || entryType === "checkout")) {
        return { kind:"ENTRY_URL", v: t };
      }
    } catch {}

    const rxHelloZ  = /(?:^|[#&])HZ=([^&]+)/;
    const rxHello   = /(?:^|[#&])HELLO=([^&]+)/;
    const rxResp    = /(?:^|[#&])RESP=([A-Za-z0-9\-_]+)/;
    const rxCombZ   = /(?:^|[#&])COMB_Z=([A-Za-z0-9\-_]+)/;
    const rxComb    = /(?:^|[#&])COMB=([A-Za-z0-9\-_]+)/;
    const rxReceipt = /(?:^|[#&])receipt=([A-Za-z0-9\-_]+)/;

    let m;
    const sources = [t];
    try { sources.push(new URL(t).hash || ""); } catch {}

    for (const s of sources) {
      m = s.match(rxHelloZ);  if (m) return { kind:"HELLO_Z", v:m[1] };
      m = s.match(rxHello);   if (m) return { kind:"HELLO",   v:m[1] };
      m = s.match(rxCombZ);   if (m) return { kind:"COMB_Z",  v:m[1] };
      m = s.match(rxComb);    if (m) return { kind:"COMB",    v:m[1] };
      m = s.match(rxResp);    if (m) return { kind:"RESP",    v:m[1] };
      m = s.match(rxReceipt); if (m) return { kind:"RECEIPT", v:m[1] };
    }
    return { kind:"UNKNOWN", v:null };
  }

  function getStoredPreferredCameraId(){
    try{ const v = localStorage.getItem(KEY_PREF_CAM); return v && v.trim() ? v.trim() : null; }catch{ return null; }
  }
  function setStoredPreferredCameraId(id){
    try{ localStorage.setItem(KEY_PREF_CAM, id || ""); }catch{}
  }
  function scoreRearLabel(label){
    const s = (label || "").toLowerCase();
    let score = 0;
    if (s.includes("back")) score += 80;
    if (s.includes("rear")) score += 80;
    if (s.includes("environment")) score += 60;
    if (/camera\s*0/.test(s)) score += 30;
    if (s.includes("facing back")) score += 100;
    return score;
  }

  async function listCamerasAndSelectDefault(){
    if (!Html5Qrcode || !Html5Qrcode.getCameras) return;
    const cams = await Html5Qrcode.getCameras();
    if (!cams || !cams.length) throw new Error("No cameras found.");
    cameraSelect.innerHTML = "";
    cams.forEach((c, i) => {
      const opt = document.createElement("option");
      opt.value = c.id;
      opt.textContent = c.label || ("Camera " + i);
      cameraSelect.appendChild(opt);
    });
    const pref = getStoredPreferredCameraId();
    if (pref && cams.some(c => c.id === pref)) {
      cameraSelect.value = pref;
    } else {
      let bestIdx = 0, bestScore = -1;
      cams.forEach((c, i) => {
        const sc = scoreRearLabel(c.label);
        if (sc > bestScore) { bestScore = sc; bestIdx = i; }
      });
      cameraSelect.value = cams[bestIdx].id;
    }
  }

  const logoImg = new Image();
  logoImg.src = "logo.png";
  let logoLoaded = false;
  logoImg.onload = () => { logoLoaded = true; };

  function lerpPt(a, b, t) {
    return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
  }

  let detectionRings = [];

  function drawTrackingFrame() {
    const video = scannerEl.querySelector("video");
    if (!video || video.readyState < 2) {
      trackingRAF = requestAnimationFrame(drawTrackingFrame);
      return;
    }
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    if (!vw || !vh) {
      trackingRAF = requestAnimationFrame(drawTrackingFrame);
      return;
    }
    const rect = scannerEl.getBoundingClientRect();
    if (!rect.width || !rect.height) {
      trackingRAF = requestAnimationFrame(drawTrackingFrame);
      return;
    }
    const dpr = window.devicePixelRatio || 1;
    const cw = Math.floor(rect.width * dpr);
    const ch = Math.floor(rect.height * dpr);
    if (trackingCanvas.width !== cw || trackingCanvas.height !== ch) {
      trackingCanvas.width = cw;
      trackingCanvas.height = ch;
    }

    const sampleW = 640;
    const sampleH = Math.round(sampleW * (vh / vw));
    if (!drawTrackingFrame._sampleCanvas) {
      drawTrackingFrame._sampleCanvas = document.createElement("canvas");
    }
    const sc = drawTrackingFrame._sampleCanvas;
    if (sc.width !== sampleW || sc.height !== sampleH) {
      sc.width = sampleW;
      sc.height = sampleH;
    }
    const sctx = sc.getContext("2d", { willReadFrequently: true });
    sctx.filter = "contrast(1.15) brightness(1.05)";
    sctx.drawImage(video, 0, 0, vw, vh, 0, 0, sampleW, sampleH);
    sctx.filter = "none";
    const imgData = sctx.getImageData(0, 0, sampleW, sampleH);

    const qr = (typeof jsQR === "function") ? jsQR(imgData.data, sampleW, sampleH) : null;
    const now = performance.now();
    const wasDetected = qrDetectedCount > 3;

    if (qr && qr.location) {
      const mapPt = (p) => ({ x: (p.x / sampleW) * cw, y: (p.y / sampleH) * ch });
      const newCorners = {
        tl: mapPt(qr.location.topLeftCorner),
        tr: mapPt(qr.location.topRightCorner),
        br: mapPt(qr.location.bottomRightCorner),
        bl: mapPt(qr.location.bottomLeftCorner)
      };
      const smoothing = lastQrCorners ? 0.35 : 1.0;
      if (lastQrCorners) {
        lastQrCorners = {
          tl: lerpPt(lastQrCorners.tl, newCorners.tl, smoothing),
          tr: lerpPt(lastQrCorners.tr, newCorners.tr, smoothing),
          br: lerpPt(lastQrCorners.br, newCorners.br, smoothing),
          bl: lerpPt(lastQrCorners.bl, newCorners.bl, smoothing)
        };
      } else {
        lastQrCorners = newCorners;
      }
      lastQrTime = now;
      if (!wasDetected && qrDetectedCount <= 3) {
        const cx = (newCorners.tl.x + newCorners.br.x) / 2;
        const cy = (newCorners.tl.y + newCorners.br.y) / 2;
        detectionRings.push({ cx, cy, birth: now, maxR: Math.max(cw, ch) * 0.5 });
      }
      qrDetectedCount = Math.min(qrDetectedCount + 1, 30);
    } else if (now - lastQrTime > 500) {
      qrDetectedCount = Math.max(0, qrDetectedCount - 2);
    }

    trackingCtx.clearRect(0, 0, cw, ch);
    detectionRings = detectionRings.filter(r => {
      const age = (now - r.birth) / 1000;
      if (age > 1.2) return false;
      const progress = age / 1.2;
      const ringR = progress * r.maxR;
      const ringAlpha = (1 - progress) * 0.35;
      trackingCtx.beginPath();
      trackingCtx.arc(r.cx, r.cy, ringR, 0, Math.PI * 2);
      trackingCtx.strokeStyle = `rgba(0, 230, 118, ${ringAlpha})`;
      trackingCtx.lineWidth = 2 * dpr;
      trackingCtx.stroke();
      return true;
    });

    if (qrDetectedCount === 0) {
      const period = 3000;
      const t = (now % period) / period;
      const y = t * ch;
      const grad = trackingCtx.createLinearGradient(0, y - 30 * dpr, 0, y + 30 * dpr);
      grad.addColorStop(0, "rgba(0, 230, 118, 0)");
      grad.addColorStop(0.5, "rgba(0, 230, 118, 0.18)");
      grad.addColorStop(1, "rgba(0, 230, 118, 0)");
      trackingCtx.fillStyle = grad;
      trackingCtx.fillRect(0, y - 30 * dpr, cw, 60 * dpr);

      if (logoLoaded) {
        const logoH = ch * 0.28;
        const logoW = logoH * (logoImg.naturalWidth / logoImg.naturalHeight);
        const lx = (cw - logoW) / 2;
        const ly = (ch - logoH) / 2;
        const cycle = (now % 6000) / 6000;
        const sinVal = Math.sin(cycle * Math.PI * 2);
        const opacity = Math.abs(sinVal) * 0.4;
        if (opacity > 0.01) {
          trackingCtx.save();
          trackingCtx.globalAlpha = opacity;
          trackingCtx.drawImage(logoImg, lx, ly, logoW, logoH);
          trackingCtx.restore();
        }
      }

    }

    trackingRAF = requestAnimationFrame(drawTrackingFrame);
  }

  function startTracking() {
    lastQrCorners = null;
    lastQrTime = 0;
    qrDetectedCount = 0;
    detectionRings = [];
    if (trackingRAF) cancelAnimationFrame(trackingRAF);
    trackingRAF = requestAnimationFrame(drawTrackingFrame);
  }

  function stopTracking() {
    if (trackingRAF) {
      cancelAnimationFrame(trackingRAF);
      trackingRAF = null;
    }
    trackingCtx.clearRect(0, 0, trackingCanvas.width, trackingCanvas.height);
    lastQrCorners = null;
    qrDetectedCount = 0;
  }

  async function handleScannedAcceptQR(respB64, isCompressed) {
    const helloB64 = localStorage.getItem("irlid_last_hello_b64");
    if (!helloB64) throw new Error("No HELLO found. Show your HELLO QR on the Home page first.");
    dbg("Creating fresh self-response for HELLO...");
    try { delete window.__irlid_last_self_response; } catch(e){}
    try { localStorage.removeItem("irlid_last_self_response"); } catch(e){}

    const freshSelf = await makeReturnForHelloAsync(helloB64);
    window.__irlid_last_self_response = freshSelf;

    const otherRespObj = isCompressed
      ? await irlidDecompressFromB64url(respB64)
      : irlidDecodeB64urlJson(respB64);

    if (freshSelf.pub && otherRespObj && otherRespObj.pub && freshSelf.pub.x === otherRespObj.pub.x) {
      throw new Error("Both sides have the same key. You may have scanned your own QR.");
    }

    const out = await processScannedResponse(otherRespObj, {
      hello: helloB64,
      tsTolS: IRLID_TS_TOL_S,
      distTolM: IRLID_DIST_TOL_M
    });

    let receiptUrl = null;
    if (window.IRLBackend) {
      try {
        const upRes = await window.IRLBackend.uploadReceipt(out.combined);
        if (upRes.ok && upRes.data && upRes.data.receipt_hash) {
          receiptUrl = "receipt.html#receipt=" + upRes.data.receipt_hash;
        }
      } catch(e) {
        dbg("Upload error: " + e);
      }
    }

    if (!receiptUrl) {
      const stripped = irlidStripCombinedForEncoding(out.combined);
      if (typeof irlidHasCompression === "function" && irlidHasCompression()) {
        const compressed = await irlidCompressToB64url(stripped);
        receiptUrl = "receipt.html#COMB_Z=" + compressed;
      } else {
        receiptUrl = "receipt.html#COMB=" + irlidEncodeJsonToB64url(stripped);
      }
    }

    try { localStorage.removeItem("irlid_last_hello_b64"); } catch(e){}
    try { localStorage.removeItem("irlid_last_self_response"); } catch(e){}
    try { delete window.__irlid_last_self_response; } catch(e){}
    return receiptUrl;
  }

  async function stopScanner(){
    stopBtn.style.display = "none";
    scanBtn.style.display = "";
    stopTracking();
    if (!html5QrCode) return;
    try { await html5QrCode.stop(); } catch {}
    try { await html5QrCode.clear(); } catch {}
    html5QrCode = null;
    scanViewport.style.aspectRatio = "";
    setViewportState("idle");
  }

  async function startScanner(){
    await stopScanner();
    setStatus("Starting camera…");
    const camId = cameraSelect.value;
    if (!camId) throw new Error("No camera selected.");
    setStoredPreferredCameraId(camId);
    scanBtn.style.display = "none";
    stopBtn.style.display = "";
    setViewportState("scanning");
    setStatus("Scanning", true);
    scannerEl.innerHTML = "";
    html5QrCode = new Html5Qrcode("scanner");

    await html5QrCode.start(
      { deviceId: { exact: camId } },
      { fps: 15, disableFlip: false, experimentalFeatures: { useBarCodeDetectorIfSupported: true } },
      async (text) => {
        await stopScanner();
        const c = classify(text);
        dbg("Scanned: " + c.kind);

        if (c.kind === "ENTRY_URL") {
          setStatus("Entry QR detected. Opening…");
          location.href = c.v;
          return;
        }
        if (c.kind === "HELLO" || c.kind === "HELLO_Z") {
          setStatus("HELLO detected. Redirecting to Accept page…");
          location.href = c.kind === "HELLO_Z" ? "accept.html#HZ=" + c.v : "accept.html#HELLO=" + c.v;
          return;
        }
        if (c.kind === "COMB_Z") {
          setStatus("Receipt detected. Opening…");
          location.href = "receipt.html#COMB_Z=" + (c.v || "");
          return;
        }
        if (c.kind === "COMB") {
          setStatus("Receipt detected. Opening…");
          location.href = "receipt.html#COMB=" + (c.v || "");
          return;
        }
        if (c.kind === "RECEIPT") {
          setStatus("Receipt detected. Opening…");
          location.href = "receipt.html#receipt=" + (c.v || "");
          return;
        }
        if (c.kind === "RESP" || c.kind === "RESP_Z") {
          try {
            setStatus("Accept QR detected. Creating combined receipt…");
            const receiptUrl = await handleScannedAcceptQR(c.v || "", c.kind === "RESP_Z");
            if (isDebugMode()) {
              debugPanel.style.display = "block";
              const link = document.createElement("a");
              link.href = receiptUrl;
              link.textContent = "TAP TO OPEN RECEIPT";
              link.style.cssText = "display:block;color:#ff0;font-weight:bold;margin-top:8px;font-size:15px;";
              debugPanel.appendChild(link);
              setStatus("Debug mode: tap the yellow link in the panel above to open receipt.");
            } else {
              location.href = receiptUrl;
            }
          } catch(e) {
            setStatus("Error: " + e.message);
            dbg("Error: " + e.message);
            debugPanel.style.display = "block";
            console.error(e);
          }
          return;
        }

        setStatus("QR detected but not recognized as IRLid.");
      },
      () => {}
    );

    function waitForVideoAndStart() {
      const video = scannerEl.querySelector("video");
      if (!video || video.readyState < 2 || !video.videoWidth) {
        setTimeout(waitForVideoAndStart, 100);
        return;
      }
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      scanViewport.style.aspectRatio = vw + " / " + vh;
      dbg("Video: " + vw + "x" + vh + " → aspect " + (vw/vh).toFixed(2));
      startTracking();
    }
    setTimeout(waitForVideoAndStart, 200);
  }

  scanBtn.addEventListener("click", async () => {
    try {
      await listCamerasAndSelectDefault();
      await startScanner();
    } catch(e) {
      setStatus("Camera error: " + e);
      console.error(e);
    }
  });

  stopBtn.addEventListener("click", async () => {
    try { await stopScanner(); } catch(e) { console.error(e); }
    setStatus("Stopped.");
  });

  if (clearLocalBtn) {
    clearLocalBtn.addEventListener("click", () => {
      try {
        const keys = ["irlid_last_hello_b64", "irlid_last_self_response", "irlid_resp_self", "irlid_resp_other", "irlid_receipts", "irlid_receipt_last", KEY_PREF_CAM];
        for (const k of keys) localStorage.removeItem(k);
      } catch{}
      try { delete window.__irlid_last_self_response; } catch{}
      setViewportState("idle");
      setStatus("Cleared local data.");
    });
  }

  cameraSelect.addEventListener("change", async () => {
    setStoredPreferredCameraId(cameraSelect.value);
    if (html5QrCode) {
      try { await startScanner(); } catch(e) {
        setStatus("Camera error: " + e);
        console.error(e);
      }
    }
  });

  if (isDebugMode()) {
    const dc = document.getElementById("debugControls");
    if (dc) dc.style.display = "block";
  }

  (async () => {
    try {
      await listCamerasAndSelectDefault();
      await startScanner();
    } catch(e) {
      setStatus("Tap 'Start Camera' to begin scanning.");
      dbg("Auto-start failed: " + e);
    }
  })();
</script>
