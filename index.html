  <div id="qrError" aria-live="polite"></div>

  <!-- Force column layout only on this page so debug button sits UNDER QR -->
  <main class="home-main" style="flex-direction:column; align-items:center;">
    <div class="qr-box home-qr" id="myQr" aria-label="Your IRLid Signed HELLO (Offer) QR"></div>
  
    <div id="debugControls" style="display:none; text-align:center; margin-top:12px;">
      <button class="btn secondary" id="clearLocalBtn" type="button">Clear local data</button>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/backend.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/sign.js?v=3.1"></script>
  <script src="js/qr.js?v=59"></script>

  <script>
    const qrErrorEl = document.getElementById("qrError");
    function showErr(e){
      console.error(e);
      qrErrorEl.style.display = "block";

      // GPS errors get a clean, human-readable card with fix instructions
      if (e && e.irlidGeoError) {
        qrErrorEl.style.fontFamily = "Arial, sans-serif";
        qrErrorEl.style.whiteSpace = "pre-wrap";
        const parts = (e.message || "").split("\n\n");
        const headline = parts[0] || "Location unavailable.";
        const detail = parts.slice(1).join("\n\n");
        qrErrorEl.innerHTML =
          "<strong style='display:block;margin-bottom:8px;font-size:15px;'>" +
          "\uD83D\uDCCD " + headline.replace(/</g,"&lt;") +
          "</strong>" +
          "<span style='font-size:13px;line-height:1.6;'>" +
          detail.replace(/</g,"&lt;").replace(/\n/g,"<br>") +
          "</span>";
        return;
      }

      // All other errors: keep original monospace stack trace style
      qrErrorEl.style.fontFamily = "";
      qrErrorEl.style.whiteSpace = "";
      qrErrorEl.textContent = String(e && (e.stack || e.message) ? (e.stack || e.message) : e);
    }
    window.addEventListener("error", (e) => showErr(e.error || e.message));
    window.addEventListener("unhandledrejection", (e) => showErr(e.reason || e));

    function computeQrSize(){
      const box = document.getElementById("myQr");
      const boxW = box.clientWidth || Math.min(window.innerWidth - 24, 900);

      const header = document.querySelector("header.site-header");
      const headerH = header ? header.getBoundingClientRect().height : 0;

      const isMobile = window.matchMedia("(max-width: 720px)").matches;
      const nav = document.querySelector("nav.site-nav");
      const navH = nav ? nav.getBoundingClientRect().height : 0;

      const vv = window.visualViewport;
      const viewportH = vv ? vv.height : window.innerHeight;

      const pad = isMobile ? 16 : 40;
      const availH = Math.max(240, viewportH - headerH - (isMobile ? navH : 0) - pad);

      const size = Math.floor(Math.min(boxW, availH));
      return Math.max(260, Math.min(size, 980));
    }

    let cachedHello = null;
    let cachedHelloUrl = null;

    async function generateHello(){
      if (typeof makeSignedHelloAsync === "function") {
        return await makeSignedHelloAsync({ tsTolS: 90 });
      } else {
        const pub = await getPublicJwk();
        return {
          v: 1,
          type: "hello",
          pub: (typeof compactJwk === "function") ? compactJwk(pub) : pub,
          nonce: crypto.getRandomValues(new Uint32Array(1))[0],
          ts: Math.floor(Date.now() / 1000)
        };
      }
    }

    async function renderHelloQr(){
      try {
        if (typeof getPublicJwk !== "function") throw new Error("getPublicJwk() missing in js/sign.js");
        if (typeof b64urlEncode !== "function") throw new Error("b64urlEncode() missing in js/sign.js");
        if (typeof makeQR !== "function") throw new Error("makeQR() missing in js/qr.js");

        // Clear stale handshake data from any previous session (only on first render)
        if (!cachedHello) {
          try {
            localStorage.removeItem("irlid_last_self_response");
            delete window.__irlid_last_self_response;
          } catch(e){}
        }

        // Check if there's a still-fresh HELLO in localStorage we should reuse
        if (!cachedHello) {
          try {
            const existingB64 = localStorage.getItem("irlid_last_hello_b64");
            if (existingB64) {
              const existingObj = JSON.parse(new TextDecoder().decode(
                Uint8Array.from(atob(existingB64.replace(/-/g,'+').replace(/_/g,'/')), c => c.charCodeAt(0))
              ));
              // Reuse if it's less than 60 seconds old
              if (existingObj && existingObj.ts && (Math.floor(Date.now()/1000) - existingObj.ts) < 60) {
                cachedHello = existingObj;
              }
            }
          } catch(e) {}
        }

        // Generate new HELLO only if we don't have a fresh one
        if (!cachedHello) {
          cachedHello = await generateHello();

          const baseUrl = location.origin + (location.pathname.includes("/IRLid") ? "/IRLid" : "");
          if (typeof irlidHasCompression === "function" && irlidHasCompression()) {
            const compressed = await irlidCompressToB64url(cachedHello);
            cachedHelloUrl = `${baseUrl}/accept.html#HZ=${compressed}`;
          } else {
            const encodedHello = b64urlEncode(new TextEncoder().encode(JSON.stringify(cachedHello)));
            cachedHelloUrl = `${baseUrl}/accept.html#HELLO=${encodedHello}`;
          }

          // Save to localStorage for scan.html Scan page
          try {
            const helloB64 = b64urlEncode(new TextEncoder().encode(JSON.stringify(cachedHello)));
            localStorage.setItem("irlid_last_hello_b64", helloB64);
          } catch(e) { console.warn("Could not save HELLO:", e); }
        }

        // Re-render QR at current size (same HELLO)
        const size = computeQrSize();
        await makeQR("myQr", cachedHelloUrl, size);

        qrErrorEl.style.display = "none";
        qrErrorEl.textContent = "";
      } catch (e) {
        showErr(e);
      }
    }

    // Guard against concurrent renders (prevents double QR on load and back-navigation)
    let _qrRendering = false;
    async function safeRenderHelloQr() {
      if (_qrRendering) return;
      _qrRendering = true;
      try { await renderHelloQr(); } finally { _qrRendering = false; }
    }

    // Debounced rerender — collapses window resize + visualViewport resize
    // which both fire simultaneously on mobile, into a single render
    let _rerenderTimer = null;
    const rerender = () => {
      if (_rerenderTimer) clearTimeout(_rerenderTimer);
      _rerenderTimer = setTimeout(safeRenderHelloQr, 150);
    };
    window.addEventListener("resize", rerender);
    window.addEventListener("orientationchange", rerender);
    if (window.visualViewport) window.visualViewport.addEventListener("resize", rerender);

    // Initial render — via rerender so it goes through the same debounce path
    rerender();

    function isDebug(){
      try{
        const qs = new URLSearchParams(location.search || "");
        if (qs.get("debug") === "1" || qs.get("debug") === "true") return true;
      }catch{}
      try{
        const v = localStorage.getItem("irlid_debug");
        if (v === "1" || v === "true") return true;
      }catch{}
      try{
        const h = location.hash || "";
        if (/(?:^|[#&])DEBUG=(1|true)(?:&|$)/i.test(h)) return true;
      }catch{}
      return false;
    }

    const debugControls = document.getElementById("debugControls");
    if (debugControls) debugControls.style.display = isDebug() ? "block" : "none";

    const clearLocalBtn = document.getElementById("clearLocalBtn");
    if (clearLocalBtn) {
      clearLocalBtn.addEventListener("click", () => {
        try{
          const keys = [
            "irlid_last_hello_b64",
            "irlid_last_self_response",
            "irlid_resp_self",
            "irlid_resp_other",
            "irlid_receipts",
            "irlid_receipt_last",
            "irlid_preferred_camera_id"
          ];
          for (const k of keys) localStorage.removeItem(k);
        }catch{}
        location.hash = "";
        location.reload();
      });
    }

    // ========== Double-tap fullscreen QR ==========
    (function(){
      const qrEl = document.getElementById("myQr");
      if (!qrEl) return;

      // Fullscreen overlay (CSS fallback for iOS which lacks Fullscreen API)
      const overlay = document.createElement("div");
      overlay.id = "qrFullscreenOverlay";
      overlay.style.cssText = "display:none;position:fixed;inset:0;z-index:99999;background:#000;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;";
      const qrHolder = document.createElement("div");
      qrHolder.id = "qrFullscreenHolder";
      qrHolder.style.cssText = "width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box;";
      const hint = document.createElement("div");
      hint.textContent = "Tap to exit";
      hint.style.cssText = "position:absolute;bottom:max(24px,env(safe-area-inset-bottom,12px));color:rgba(255,255,255,0.35);font:500 13px/1 system-ui,sans-serif;letter-spacing:0.04em;";
      overlay.appendChild(qrHolder);
      overlay.appendChild(hint);
      document.body.appendChild(overlay);

      let isFullscreen = false;

      async function enterFullscreenQr(){
        if (isFullscreen) return;
        isFullscreen = true;

        // Try native fullscreen first (works on Android Chrome, desktop)
        try {
          if (document.documentElement.requestFullscreen) {
            await document.documentElement.requestFullscreen();
          } else if (document.documentElement.webkitRequestFullscreen) {
            document.documentElement.webkitRequestFullscreen();
          }
        } catch(e){}

        overlay.style.display = "flex";
        document.body.style.overflow = "hidden";

        // Render a large QR into the fullscreen holder
        const vw = window.innerWidth || screen.width;
        const vh = window.innerHeight || screen.height;
        const size = Math.floor(Math.min(vw, vh) - 32);
        if (cachedHelloUrl && typeof makeQR === "function") {
          qrHolder.innerHTML = "";
          await makeQR("qrFullscreenHolder", cachedHelloUrl, size);
        }
      }

      function exitFullscreenQr(){
        if (!isFullscreen) return;
        isFullscreen = false;
        overlay.style.display = "none";
        document.body.style.overflow = "";
        qrHolder.innerHTML = "";

        try {
          if (document.exitFullscreen) document.exitFullscreen();
          else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        } catch(e){}

        // Re-render normal QR
        rerender();
      }

      // Exit on native fullscreen change (e.g. back button on Android)
      document.addEventListener("fullscreenchange", () => {
        if (!document.fullscreenElement && isFullscreen) exitFullscreenQr();
      });
      document.addEventListener("webkitfullscreenchange", () => {
        if (!document.webkitFullscreenElement && isFullscreen) exitFullscreenQr();
      });

      // Tap overlay to exit
      overlay.addEventListener("click", exitFullscreenQr);

      // Double-tap detection on the QR element
      let lastTap = 0;
      qrEl.addEventListener("touchend", function(e){
        const now = Date.now();
        if (now - lastTap < 350) {
          e.preventDefault();
          enterFullscreenQr();
          lastTap = 0;
        } else {
          lastTap = now;
        }
      }, { passive: false });

      // Desktop: double-click
      qrEl.addEventListener("dblclick", function(e){
        e.preventDefault();
        if (isFullscreen) exitFullscreenQr();
        else enterFullscreenQr();
      });
    })();
  </script>
